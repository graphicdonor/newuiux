name: Deploy to Netlify

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Netlify build hook
        run: |
          curl -s -X POST "https://api.netlify.com/build_hooks/6a2ab5135d3a64178c5e0526"
          echo "Deploy triggered ✓"
